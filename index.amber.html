<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>text-to-strudel</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&family=Red+Hat+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0e;
    --surface: #101016;
    --border: #1e1e2a;
    --border-hi: #2e2e40;
    --accent: #e8a040;
    --accent-dim: rgba(232,160,64,.06);
    --green: #38c068;
    --red: #d84848;
    --txt: #d0d0d8;
    --txt-2: #8888a0;
    --txt-3: #50506a;
    --body: 'Outfit', sans-serif;
    --mono: 'Red Hat Mono', monospace;
    --r: 5px;
    --grain: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.025'/%3E%3C/svg%3E");
  }
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  html { overflow-x: hidden; }
  body {
    background: var(--bg); color: var(--txt);
    font-family: var(--body); font-weight: 300;
    min-height: 100vh; display: flex; justify-content: center;
    padding: 2.5rem 1.25rem 4rem;
    overflow-x: hidden; width: 100%; max-width: 100%;
  }
  body::after {
    content: ''; position: fixed; inset: 0;
    background: var(--grain); pointer-events: none; z-index: 9999;
  }

  /* ---- LAYOUT: single column ---- */
  .shell { max-width: 740px; width: 100%; }
  .panel { display: flex; flex-direction: column; gap: .7rem; }
  .output { margin-top: 1.5rem; display: none; }
  .output.visible, .output:not(.hidden) { display: block; }
  .output.hidden { display: none; }

  /* ---- BRAND ---- */
  .brand-row { padding-bottom: .5rem; border-bottom: 1px solid var(--border); margin-bottom: .5rem; }
  .brand { font-family: var(--mono); font-size: .62rem; font-weight: 600; letter-spacing: .14em; text-transform: uppercase; color: var(--txt-2); margin-bottom: .15rem; }
  .tagline { font-size: 1.4rem; font-weight: 300; color: var(--txt); line-height: 1.3; }
  .tagline em { font-style: normal; color: var(--accent); }

  /* ---- API ---- */
  details.api { margin-bottom: .5rem; }
  details.api summary { font-family: var(--mono); font-size: .64rem; font-weight: 600; letter-spacing: .1em; text-transform: uppercase; color: var(--txt-3); cursor: pointer; }
  details.api summary:hover { color: var(--txt-2); }
  details.api[open] summary { color: var(--accent); }
  details.api.verified summary { color: var(--green); }
  details.api.verified summary::after { content: ' [OK]'; }
  details.api.no-key summary::after { content: ''; }
  details.api.invalid summary { color: var(--red); }
  details.api.invalid summary::after { content: ' [FAIL]'; }
  .api-row { display: flex; gap: .4rem; margin-top: .4rem; }
  .api-row select, .api-row input { background: var(--surface); border: 1px solid var(--border); color: var(--txt); font-size: .78rem; padding: .35rem .5rem; border-radius: var(--r); outline: none; }
  .api-row select { font-family: var(--body); }
  .api-row input { flex: 1; font-family: var(--mono); font-size: .72rem; }
  .api-row select:focus, .api-row input:focus { border-color: var(--accent); }
  .api-save { font-family: var(--mono); font-size: .62rem; font-weight: 600; letter-spacing: .08em; text-transform: uppercase; background: var(--surface); border: 1px solid var(--border); color: var(--txt-2); padding: .35rem .6rem; border-radius: var(--r); cursor: pointer; }
  .api-save:hover { border-color: var(--border-hi); color: var(--txt); }
  .api-hint { font-size: .66rem; color: var(--txt-3); margin-top: .25rem; }
  .api-hint.saved { color: var(--green); }
  .api-hint.error { color: var(--red); }

  /* ---- INPUT ---- */
  .mod-label { font-family: var(--mono); font-size: .6rem; font-weight: 600; letter-spacing: .12em; text-transform: uppercase; color: var(--txt-3); margin-bottom: .2rem; }
  .prompt-input { width: 100%; background: var(--surface); border: 1px solid var(--border); color: var(--txt); font-family: var(--body); font-size: 1rem; font-weight: 300; padding: .8rem .9rem; border-radius: var(--r); resize: vertical; min-height: 60px; outline: none; line-height: 1.5; }
  .prompt-input:focus { border-color: var(--accent); box-shadow: 0 0 0 1px var(--accent); }
  .prompt-input::placeholder { color: var(--txt-3); }

  /* ---- GENRES ---- */
  .genres { display: flex; flex-wrap: wrap; gap: .3rem; margin-top: .2rem; }
  .genre-btn { font-family: var(--mono); font-size: .68rem; background: transparent; border: 1px solid var(--border); color: var(--txt-3); padding: .28rem .7rem; border-radius: 100px; cursor: pointer; transition: all .12s; }
  .genre-btn:hover { border-color: var(--border-hi); color: var(--txt-2); }
  .genre-btn.active { color: #fff; border-color: var(--accent); background: var(--accent-dim); }
  .genre-btn.fusion-pick { color: #fff !important; border-color: var(--accent) !important; background: var(--accent-dim) !important; }

  /* ---- FUSION ---- */
  .fusion-toggle { display: flex; align-items: center; gap: .4rem; cursor: pointer; user-select: none; margin-top: .2rem; }
  .fusion-toggle input { appearance: none; width: 24px; height: 12px; background: var(--border); border-radius: 100px; position: relative; cursor: pointer; }
  .fusion-toggle input::after { content: ''; position: absolute; top: 2px; left: 2px; width: 8px; height: 8px; background: var(--txt-3); border-radius: 50%; transition: all .15s; }
  .fusion-toggle input:checked { background: var(--accent); }
  .fusion-toggle input:checked::after { left: 14px; background: var(--bg); }
  .fusion-label { font-family: var(--mono); font-size: .62rem; font-weight: 600; letter-spacing: .06em; text-transform: uppercase; color: var(--txt-3); }
  .fusion-toggle input:checked ~ .fusion-label { color: var(--accent); }
  .fusion-hint { font-size: .58rem; color: var(--txt-2); opacity: 0; transition: opacity .15s; }
  .fusion-toggle input:checked ~ .fusion-hint { opacity: 1; }

  /* ---- GENERATE ---- */
  .btn-generate { width: 100%; font-family: var(--mono); font-size: .82rem; font-weight: 600; letter-spacing: .08em; text-transform: uppercase; background: var(--accent); color: var(--bg); border: none; padding: .65rem; border-radius: var(--r); cursor: pointer; transition: all .15s; margin-top: .3rem; }
  .btn-generate:hover { filter: brightness(1.1); box-shadow: 0 0 16px rgba(232,160,64,.15); }
  .btn-generate:disabled { opacity: .35; cursor: wait; }

  /* ---- TRANSPORT ---- */
  .transport { display: flex; align-items: center; gap: .35rem; margin-top: .3rem; }
  .t-btn { font-family: var(--mono); font-size: .66rem; font-weight: 600; letter-spacing: .06em; text-transform: uppercase; background: transparent; border: 1px solid var(--border); color: var(--txt-3); padding: .28rem .6rem; border-radius: var(--r); cursor: pointer; transition: all .12s; }
  .t-btn:hover { border-color: var(--border-hi); color: var(--txt-2); }
  .t-btn.t-play { color: var(--green); border-color: color-mix(in srgb, var(--green) 25%, transparent); }
  .t-btn.t-play:hover { background: color-mix(in srgb, var(--green) 6%, transparent); }
  .t-btn.t-stop { color: var(--red); border-color: color-mix(in srgb, var(--red) 25%, transparent); }
  .t-btn.t-stop:hover { background: color-mix(in srgb, var(--red) 6%, transparent); }
  .t-btn.t-regen { border-style: dashed; }
  .t-btn:disabled { opacity: .3; }
  .transport-spacer { flex: 1; }

  /* ---- MIXER ---- */
  .mixer { display: flex; flex-direction: column; gap: .15rem; margin-top: .3rem; }
  .mixer-grid { display: grid; grid-template-columns: 1fr 1fr; gap: .1rem .4rem; }
  .mixer-ch { display: flex; align-items: center; height: 1.5rem; }
  .ch-label { font-family: var(--mono); font-size: .58rem; font-weight: 600; letter-spacing: .06em; text-transform: uppercase; color: var(--txt-3); width: 5rem; flex-shrink: 0; }
  .ch-minus, .ch-plus, .ch-toggle { width: 1.8rem; height: 1.4rem; display: flex; align-items: center; justify-content: center; background: var(--surface); border: 1px solid var(--border); color: var(--txt-3); font-family: var(--mono); font-size: .7rem; font-weight: 600; border-radius: var(--r); cursor: pointer; transition: all .1s; }
  .ch-minus { margin-right: -1px; border-radius: var(--r) 0 0 var(--r); z-index: 0; }
  .ch-plus { border-radius: 0 var(--r) var(--r) 0; z-index: 0; }
  .ch-minus:hover, .ch-plus:hover { background: var(--accent-dim); color: var(--accent); border-color: rgba(232,160,64,.3); z-index: 1; }
  .ch-toggle { border-radius: var(--r); margin-right: .15rem; }
  .ch-toggle:hover { color: var(--txt-2); border-color: var(--border-hi); }
  .mixer-divider { border-top: 1px solid var(--border); margin: .3rem 0; }
  .mixer-tags { display: flex; flex-wrap: wrap; gap: .15rem; padding: .1rem 0; }
  .ch-tag, .ch-mood { background: var(--surface); border: 1px solid var(--border); color: var(--txt-3); font-family: var(--mono); font-size: .6rem; font-weight: 600; letter-spacing: .04em; text-transform: uppercase; padding: .2rem .5rem; border-radius: var(--r); cursor: pointer; transition: all .1s; }
  .ch-tag:hover { color: var(--accent); border-color: rgba(232,160,64,.3); }
  .ch-tag.active { color: var(--accent) !important; border-color: rgba(232,160,64,.4) !important; background: var(--accent-dim) !important; }
  .ch-mood { color: var(--accent); border-color: rgba(232,160,64,.2); }
  .ch-mood:hover { border-color: rgba(232,160,64,.4); background: var(--accent-dim); }
  .flash-ok { background: color-mix(in srgb, var(--green) 10%, transparent) !important; border-color: var(--green) !important; color: var(--green) !important; transition: none !important; }
  .flash-fail { background: color-mix(in srgb, var(--red) 10%, transparent) !important; border-color: var(--red) !important; color: var(--red) !important; transition: none !important; }

  /* ---- EDIT ---- */
  .edit-row { display: flex; align-items: center; gap: .3rem; margin-top: .3rem; }
  .tweak-label { font-family: var(--mono); font-size: .58rem; font-weight: 600; letter-spacing: .1em; text-transform: uppercase; color: var(--txt-3); min-width: 2.5rem; }
  .edit-input { flex: 1; font-family: var(--body); font-size: .78rem; font-weight: 300; background: var(--surface); border: 1px solid var(--border); color: var(--txt); padding: .35rem .6rem; border-radius: var(--r); outline: none; }
  .edit-input:focus { border-color: var(--accent); }
  .edit-input::placeholder { color: var(--txt-3); }
  .edit-apply { font-family: var(--mono); font-size: .62rem; font-weight: 600; letter-spacing: .06em; text-transform: uppercase; background: var(--accent); color: var(--bg); border: none; padding: .35rem .65rem; border-radius: var(--r); cursor: pointer; }
  .edit-apply:hover { filter: brightness(1.1); }
  .edit-apply:disabled { opacity: .35; }
  .mixer-toggle { font-family: var(--mono); font-size: .58rem; font-weight: 600; letter-spacing: .06em; text-transform: uppercase; background: transparent; border: 1px dashed var(--border); color: var(--txt-3); padding: .3rem .5rem; border-radius: var(--r); cursor: pointer; margin-left: auto; }
  .mixer-toggle:hover { border-color: var(--border-hi); color: var(--txt-2); }
  .mixer-toggle.active { color: var(--accent); border-color: rgba(232,160,64,.3); border-style: solid; }

  /* ---- STATUS ---- */
  .status { font-family: var(--mono); font-size: .68rem; color: var(--txt-3); margin-top: .4rem; min-height: 1em; }
  .status.playing { color: var(--green); }
  .status.error { color: var(--red); }
  @keyframes dot { 0%,100%{opacity:1} 50%{opacity:.25} }
  .status.playing::before { content: ''; display: inline-block; width: 5px; height: 5px; background: var(--green); border-radius: 50%; margin-right: 5px; box-shadow: 0 0 6px var(--green); animation: dot 1.2s ease-in-out infinite; }

  /* ---- EDITOR ---- */
  strudel-editor { display: block; min-height: 0; max-height: 540px; overflow-y: auto; }

  /* ---- RESPONSIVE ---- */
  @media (max-width: 600px) {
    body { padding: 1.5rem .75rem 3rem; }
    .shell { max-width: 100%; width: 100%; overflow-x: hidden; }
    .output { max-width: 100%; width: 100%; overflow-x: hidden; }
    strudel-editor { width: 100%; max-width: 100%; overflow-x: hidden; }
    .cm-editor { max-width: 100% !important; width: 100% !important; }
    .cm-editor .cm-scroller { overflow-x: auto !important; }
    .btn-generate { font-size: .75rem; }
    .genre-btn { font-size: .6rem; padding: .22rem .55rem; }
  }
</style>
</head>
<body>
<div class="shell">
  <div class="panel">
    <div class="brand-row">
      <div class="brand">text-to-strudel</div>
      <div class="tagline">Type anything. Get <em>music</em>.</div>
    </div>

    <details class="api" id="apiSettings">
      <summary>api</summary>
      <div class="api-row">
        <select id="apiProvider"><option value="gemini">Gemini</option><option value="claude">Claude</option><option value="openai">OpenAI</option></select>
        <input type="password" id="apiKey" placeholder="sk-ant-... or AIza..." autocomplete="off" spellcheck="false">
        <button class="api-save" id="apiSave">save</button>
      </div>
      <div class="api-hint" id="apiHint">no key = algorithmic mode</div>
    </details>

    <div>
      <div class="mod-label">input</div>
      <textarea class="prompt-input" id="input" placeholder="A word, a phrase, a feeling..." rows="2"></textarea>
    </div>

    <div>
      <div class="mod-label">genre</div>
      <div class="genres" id="genres">
        <button class="genre-btn active" data-genre="edm">EDM</button>
        <button class="genre-btn" data-genre="jazz">Jazz</button>
        <button class="genre-btn" data-genre="classical">Classical</button>
        <button class="genre-btn" data-genre="blues">Blues</button>
        <button class="genre-btn" data-genre="ambient">Ambient</button>
        <button class="genre-btn" data-genre="lofi">Lo-fi</button>
        <button class="genre-btn" data-genre="world">World</button>
        <button class="genre-btn" data-genre="random">Random</button>
      </div>
      <label class="fusion-toggle" id="fusionToggle">
        <input type="checkbox" id="fusionCheck">
        <span class="fusion-label">Fusion</span>
        <span class="fusion-hint">multi-select</span>
      </label>
    </div>

    <button class="btn-generate" id="playBtn">Generate &amp; Play</button>

    <div class="transport">
      <button class="t-btn t-play" id="runBtn">Play</button>
      <button class="t-btn t-stop" id="stopBtn">Stop</button>
      <span class="transport-spacer"></span>
      <button class="t-btn t-regen" id="regenBtn">Regen</button>
    </div>

    <div class="mixer" id="algoMixer" style="display:none">
      <div class="mod-label">mixer</div>
      <div class="mixer-grid">
        <div class="mixer-ch"><span class="ch-label">bpm</span><button class="refine-btn ch-minus" data-dir="slower">-</button><button class="refine-btn ch-plus" data-dir="faster">+</button></div>
        <div class="mixer-ch"><span class="ch-label">gain</span><button class="refine-btn ch-minus" data-dir="quieter">-</button><button class="refine-btn ch-plus" data-dir="louder">+</button></div>
        <div class="mixer-ch"><span class="ch-label">cutoff</span><button class="refine-btn ch-minus" data-dir="darker">-</button><button class="refine-btn ch-plus" data-dir="brighter">+</button></div>
        <div class="mixer-ch"><span class="ch-label">resonance</span><button class="refine-btn ch-minus" data-dir="less resonance">-</button><button class="refine-btn ch-plus" data-dir="more resonance">+</button></div>
        <div class="mixer-ch"><span class="ch-label">highpass</span><button class="refine-btn ch-minus" data-dir="less highpass">-</button><button class="refine-btn ch-plus" data-dir="more highpass">+</button></div>
        <div class="mixer-ch"><span class="ch-label">octave</span><button class="refine-btn ch-minus" data-dir="lower">-</button><button class="refine-btn ch-plus" data-dir="higher">+</button></div>
        <div class="mixer-ch"><span class="ch-label">reverb</span><button class="refine-btn ch-minus" data-dir="drier">-</button><button class="refine-btn ch-plus" data-dir="more reverb">+</button></div>
        <div class="mixer-ch"><span class="ch-label">delay</span><button class="refine-btn ch-minus" data-dir="less delay">-</button><button class="refine-btn ch-plus" data-dir="more delay">+</button></div>
        <div class="mixer-ch"><span class="ch-label">feedback</span><button class="refine-btn ch-minus" data-dir="less feedback">-</button><button class="refine-btn ch-plus" data-dir="more feedback">+</button></div>
        <div class="mixer-ch"><span class="ch-label">density</span><button class="refine-btn ch-minus" data-dir="sparser">-</button><button class="refine-btn ch-plus" data-dir="denser">+</button></div>
        <div class="mixer-ch"><span class="ch-label">swing</span><button class="refine-btn ch-toggle" data-dir="straighten">off</button><button class="refine-btn ch-toggle" data-dir="add swing">on</button></div>
        <div class="mixer-ch"><span class="ch-label">distort</span><button class="refine-btn ch-minus" data-dir="less distortion">-</button><button class="refine-btn ch-plus" data-dir="more distortion">+</button></div>
        <div class="mixer-ch"><span class="ch-label">crush</span><button class="refine-btn ch-minus" data-dir="less crush">-</button><button class="refine-btn ch-plus" data-dir="more crush">+</button></div>
      </div>
      <div class="mixer-divider"></div>
      <div class="mod-label">tone</div>
      <div class="mixer-tags">
        <button class="refine-btn ch-tag" data-dir="scale:major">major</button>
        <button class="refine-btn ch-tag" data-dir="scale:minor">minor</button>
        <button class="refine-btn ch-tag" data-dir="scale:dorian">dorian</button>
        <button class="refine-btn ch-tag" data-dir="scale:phrygian">phrygian</button>
        <button class="refine-btn ch-tag" data-dir="scale:lydian">lydian</button>
        <button class="refine-btn ch-tag" data-dir="scale:pentatonic">pentatonic</button>
      </div>
      <div class="mixer-divider"></div>
      <div class="mod-label">mood</div>
      <div class="mixer-tags">
        <button class="refine-btn ch-mood" data-dir="make it darker and moodier">dark</button>
        <button class="refine-btn ch-mood" data-dir="make it euphoric and uplifting">euphoric</button>
        <button class="refine-btn ch-mood" data-dir="make it dreamy and floating">dreamy</button>
        <button class="refine-btn ch-mood" data-dir="make it aggressive and intense">aggressive</button>
      </div>
    </div>

    <div class="edit-row" id="editRow" style="display:none">
      <span class="tweak-label">edit</span>
      <input class="edit-input" id="editInput" type="text" placeholder="Describe what to change..." autocomplete="off">
      <button class="edit-apply" id="editApply">Apply</button>
      <button class="mixer-toggle" id="mixerToggle" title="Show/hide mixer controls">mixer</button>
    </div>

    <div id="refineRow" style="display:none"></div>

    <div class="status" id="status"></div>
  </div>

  <div class="output hidden" id="editorWrap">
    <strudel-editor id="strudelEditor"></strudel-editor>
  </div>

</div>
<script src="https://unpkg.com/@strudel/repl@latest"></script>
<script src="app.js"></script>
</body>
</html>
