<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>text-to-strudel</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #08080f;
    color: #e0e0e0;
    font-family: 'Inter', -apple-system, sans-serif;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    padding: 2rem 1rem;
  }
  .container { max-width: 740px; width: 100%; }
  h1 {
    font-size: 2rem;
    font-weight: 300;
    letter-spacing: .08em;
    text-transform: uppercase;
    margin-bottom: .25rem;
  }
  .subtitle {
    color: #666;
    font-size: .85rem;
    margin-bottom: 2rem;
    letter-spacing: .04em;
  }
  textarea {
    width: 100%;
    background: #111118;
    border: 1px solid #222;
    color: #e0e0e0;
    font-family: inherit;
    font-size: 1.1rem;
    padding: 1rem;
    border-radius: 8px;
    resize: vertical;
    min-height: 80px;
    outline: none;
    transition: border-color .2s;
  }
  textarea:focus { border-color: #444; }
  textarea::placeholder { color: #444; }
  .genres {
    display: flex;
    flex-wrap: wrap;
    gap: .5rem;
    margin: 1.2rem 0;
  }
  .genre-btn {
    background: #111118;
    border: 1px solid #222;
    color: #999;
    padding: .5rem 1.1rem;
    border-radius: 6px;
    cursor: pointer;
    font-size: .85rem;
    letter-spacing: .03em;
    transition: all .15s;
  }
  .genre-btn:hover { border-color: #444; color: #ccc; }
  .genre-btn.active { color: #fff; border-color: var(--accent); background: color-mix(in srgb, var(--accent) 12%, #111118); }
  .genre-btn[data-genre="edm"] { --accent: #ff00ff; }
  .genre-btn[data-genre="jazz"] { --accent: #ffd700; }
  .genre-btn[data-genre="classical"] { --accent: #b0b0cc; }
  .genre-btn[data-genre="blues"] { --accent: #4488ff; }
  .genre-btn[data-genre="ambient"] { --accent: #00e5ff; }
  .genre-btn[data-genre="lofi"] { --accent: #ff8866; }
  .genre-btn[data-genre="world"] { --accent: #00ff88; }
  .genre-btn[data-genre="random"] { --accent: #fff; }
  .genre-btn[data-genre="fusion"] { --accent: linear-gradient(90deg,#ff00ff,#ffd700); border-image: linear-gradient(90deg,#ff00ff,#ffd700) 1; }
  .genre-btn[data-genre="fusion"].active { border-image: linear-gradient(90deg,#ff00ff,#ffd700) 1; background: linear-gradient(90deg, rgba(255,0,255,.12), rgba(255,215,0,.12)); color: #fff; }
  .genre-btn.fusion-pick { border-color: var(--accent) !important; color: #fff !important; background: color-mix(in srgb, var(--accent) 18%, #111118) !important; }
  .genre-sep { color: #333; font-size: .75rem; display: flex; align-items: center; padding: 0 .25rem; }
  .api-settings { margin-bottom: 1.2rem; }
  .api-settings summary {
    cursor: pointer; color: #555; font-size: .8rem; letter-spacing: .03em;
    padding: .4rem 0; user-select: none;
  }
  .api-settings summary:hover { color: #888; }
  .api-settings[open] summary { color: #999; }
  .api-row { display: flex; gap: .5rem; margin-top: .5rem; }
  .api-row select {
    background: #111118; border: 1px solid #222; color: #e0e0e0;
    font-size: .85rem; padding: .45rem .5rem; border-radius: 6px; outline: none;
  }
  .api-row select:focus { border-color: #444; }
  .api-row input {
    flex: 1; background: #111118; border: 1px solid #222; color: #e0e0e0;
    font-family: monospace; font-size: .85rem; padding: .45rem .7rem;
    border-radius: 6px; outline: none;
  }
  .api-row input:focus { border-color: #444; }
  .btn-small {
    background: #1a1a24; color: #999; border: 1px solid #333; padding: .4rem .8rem;
    border-radius: 6px; cursor: pointer; font-size: .8rem;
  }
  .btn-small:hover { color: #ccc; border-color: #555; }
  .api-hint { font-size: .7rem; color: #444; margin-top: .4rem; }
  .api-hint.saved { color: #5c5; }
  .controls { display: flex; gap: .75rem; margin: 1.2rem 0; }
  .btn {
    padding: .65rem 1.6rem;
    border-radius: 6px;
    border: none;
    font-size: .9rem;
    cursor: pointer;
    font-weight: 500;
    letter-spacing: .02em;
    transition: all .15s;
  }
  .btn-play { background: #e0e0e0; color: #08080f; }
  .btn-play:hover { background: #fff; }
  .btn-play:disabled { background: #333; color: #666; cursor: wait; }
  .btn-run { background: #1a3a1a; color: #5c5; border: 1px solid #2a4a2a; }
  .btn-run:hover { background: #1a4a1a; color: #7e7; border-color: #3a5a3a; }
  .btn-regen { background: #1a1a24; color: #999; border: 1px solid #333; }
  .btn-regen:hover { border-color: #555; color: #ccc; }
  .btn-regen:disabled { color: #444; cursor: wait; }
  .btn-stop { background: #1a1a24; color: #e0e0e0; border: 1px solid #333; }
  .btn-stop:hover { border-color: #555; }
  .seed-display { font-size: .7rem; color: #333; margin-left: .5rem; font-family: monospace; }
  .btn-copy {
    margin-left: auto;
    background: transparent;
    color: #666;
    border: 1px solid #222;
    font-size: .8rem;
    padding: .4rem .8rem;
  }
  .btn-copy:hover { color: #aaa; border-color: #444; }
  .editor-wrap {
    margin-top: 1.5rem;
    border: 1px solid #1a1a24;
    border-radius: 8px;
    overflow: hidden;
    display: none;
  }
  .editor-wrap.visible { display: block; }
  .editor-header {
    display: flex;
    align-items: center;
    padding: .5rem 1rem;
    background: #111118;
    border-bottom: 1px solid #1a1a24;
  }
  .editor-label {
    font-size: .75rem;
    color: #555;
    letter-spacing: .05em;
    text-transform: uppercase;
  }
  .editor-hint {
    margin-left: auto;
    font-size: .7rem;
    color: #444;
    letter-spacing: .02em;
  }
  strudel-editor {
    display: block;
    min-height: 180px;
    max-height: 520px;
    overflow-y: auto;
  }
  .status {
    font-size: .8rem;
    color: #444;
    margin-top: .5rem;
    min-height: 1.2em;
  }
  .status.playing { color: #5c5; }
  .status.error { color: #e55; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
  .status.playing::before {
    content: '';
    display: inline-block;
    width: 6px; height: 6px;
    background: #5c5;
    border-radius: 50%;
    margin-right: 6px;
    animation: pulse 1.2s ease-in-out infinite;
  }
  .refine-row {
    display: flex;
    flex-wrap: wrap;
    gap: .35rem;
    margin: .6rem 0;
    align-items: center;
  }
  .refine-label {
    font-size: .7rem;
    color: #555;
    letter-spacing: .03em;
    text-transform: uppercase;
  }
  .refine-btn {
    background: #111118;
    border: 1px solid #1a1a24;
    color: #666;
    padding: .25rem .6rem;
    border-radius: 4px;
    cursor: pointer;
    font-size: .72rem;
    transition: all .15s;
  }
  .refine-btn:hover { border-color: #444; color: #ccc; }
  .refine-btn.mood { color: #886; border-color: #332; }
  .refine-btn.mood:hover { color: #cc9; border-color: #554; }
  .refine-btn:disabled { color: #333; cursor: wait; }
</style>
</head>
<body>
<div class="container">
  <h1>text-to-strudel</h1>
  <p class="subtitle">Type anything. Pick a genre. Listen.</p>

  <details class="api-settings" id="apiSettings">
    <summary>API Settings</summary>
    <div class="api-row">
      <select id="apiProvider">
        <option value="claude">Claude</option>
        <option value="gemini">Gemini</option>
      </select>
      <input type="password" id="apiKey" placeholder="sk-ant-... or AIza..." autocomplete="off" spellcheck="false">
      <button class="btn-small" id="apiSave">Save</button>
    </div>
    <div class="api-hint" id="apiHint">No key = algorithmic mode. With key = AI creative mode.</div>
  </details>

  <textarea id="input" placeholder="A word, a phrase, a feeling, a memory..." rows="3"></textarea>
  <div class="genres" id="genres">
    <button class="genre-btn active" data-genre="edm">EDM</button>
    <button class="genre-btn" data-genre="jazz">Jazz</button>
    <button class="genre-btn" data-genre="classical">Classical</button>
    <button class="genre-btn" data-genre="blues">Blues</button>
    <button class="genre-btn" data-genre="ambient">Ambient</button>
    <button class="genre-btn" data-genre="lofi">Lo-fi</button>
    <button class="genre-btn" data-genre="world">World</button>
    <span class="genre-sep">|</span>
    <button class="genre-btn" data-genre="random">Random</button>
    <button class="genre-btn" data-genre="fusion">Fusion</button>
  </div>
  <div class="controls">
    <button class="btn btn-play" id="playBtn">Generate &amp; Play</button>
    <button class="btn btn-regen" id="regenBtn" title="Same input, different result">Regenerate</button>
    <button class="btn btn-run" id="runBtn" title="Play current code (Ctrl+Enter)">Play</button>
    <button class="btn btn-stop" id="stopBtn">Stop</button>
  </div>
  <div class="refine-row" id="refineRow" style="display:none">
    <span class="refine-label">Refine:</span>
    <button class="refine-btn" data-dir="faster">faster</button>
    <button class="refine-btn" data-dir="slower">slower</button>
    <button class="refine-btn" data-dir="brighter">brighter</button>
    <button class="refine-btn" data-dir="darker">darker</button>
    <button class="refine-btn" data-dir="more reverb">spacious</button>
    <button class="refine-btn" data-dir="drier">dry</button>
    <button class="refine-btn" data-dir="louder">louder</button>
    <button class="refine-btn" data-dir="quieter">quieter</button>
    <span class="refine-label" style="margin-left:.5rem">Mood:</span>
    <button class="refine-btn mood" data-dir="make it darker and moodier">dark</button>
    <button class="refine-btn mood" data-dir="make it euphoric and uplifting">euphoric</button>
    <button class="refine-btn mood" data-dir="make it dreamy and floating">dreamy</button>
    <button class="refine-btn mood" data-dir="make it aggressive and intense">aggressive</button>
  </div>
  <div class="status" id="status"></div>
  <div class="editor-wrap" id="editorWrap">
    <div class="editor-header">
      <span class="editor-label">Edit &amp; Play</span>
      <span class="editor-hint">Ctrl+Enter play &nbsp; Ctrl+. stop</span>
    </div>
    <strudel-editor id="strudelEditor"><!-- --></strudel-editor>
  </div>
</div>
<script src="https://unpkg.com/@strudel/repl@latest"></script>
<script src="app.js"></script>
</body>
</html>
