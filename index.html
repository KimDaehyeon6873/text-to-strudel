<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>text-to-strudel</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #030303;
    --surface: #0a0a0a;
    --border: #1a1a1a;
    --border-hi: #2a2a2a;
    --g: #00e060;
    --g-dim: #00802a;
    --g-glow: rgba(0,224,96,.08);
    --g-glow2: rgba(0,224,96,.15);
    --txt: #88aa88;
    --txt-hi: #c0e8c0;
    --txt-dim: #44664a;
    --red: #e04040;
    --amber: #d0a030;
    --mono: 'JetBrains Mono', 'Consolas', monospace;
    --r: 2px;
  }
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--txt);
    font-family: var(--mono);
    font-size: .78rem;
    line-height: 1.5;
    min-height: 100vh;
  }
  /* scanline overlay */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,.03) 2px, rgba(0,0,0,.03) 4px);
    pointer-events: none;
    z-index: 9999;
  }

  /* ---- 2-COLUMN LAYOUT ---- */
  .shell {
    display: grid;
    grid-template-columns: 380px 1fr;
    min-height: 100vh;
  }
  .panel {
    border-right: 1px solid var(--border);
    padding: 1.2rem 1rem;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: .7rem;
  }
  .output {
    display: flex;
    flex-direction: column;
    min-height: 0;
  }

  /* ---- BRAND ---- */
  .brand {
    font-size: .6rem;
    font-weight: 600;
    letter-spacing: .15em;
    text-transform: uppercase;
    color: var(--txt-dim);
  }
  .brand b { color: var(--g); }
  .tagline {
    font-size: .72rem;
    font-weight: 400;
    color: var(--txt-dim);
  }
  .tagline em { font-style: normal; color: var(--g); }

  /* ---- API ---- */
  details.api summary {
    font-size: .6rem;
    font-weight: 600;
    letter-spacing: .1em;
    text-transform: uppercase;
    color: var(--txt-dim);
    cursor: pointer;
  }
  details.api summary:hover { color: var(--txt); }
  details.api[open] summary { color: var(--g); }
  details.api.verified summary { color: var(--g-dim); }
  details.api.verified summary::after { content: ' \2713'; }
  details.api.invalid summary { color: var(--red); }
  details.api.invalid summary::after { content: ' \2717'; }
  .api-row { display: flex; gap: .4rem; margin-top: .4rem; }
  .api-row select, .api-row input {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--txt);
    font-family: var(--mono);
    font-size: .68rem;
    padding: .3rem .4rem;
    border-radius: var(--r);
    outline: none;
  }
  .api-row input { flex: 1; }
  .api-row select:focus, .api-row input:focus { border-color: var(--g-dim); }
  .api-save {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--txt-dim);
    font-family: var(--mono);
    font-size: .6rem;
    padding: .3rem .5rem;
    border-radius: var(--r);
    cursor: pointer;
    letter-spacing: .06em;
    text-transform: uppercase;
  }
  .api-save:hover { border-color: var(--border-hi); color: var(--txt); }
  .api-hint { font-size: .6rem; color: var(--txt-dim); margin-top: .25rem; }
  .api-hint.saved { color: var(--g-dim); }
  .api-hint.error { color: var(--red); }

  /* ---- INPUT ---- */
  .prompt-input {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--g);
    font-family: var(--mono);
    font-size: .82rem;
    padding: .6rem .7rem;
    border-radius: var(--r);
    resize: vertical;
    min-height: 52px;
    outline: none;
    caret-color: var(--g);
    transition: border-color .15s;
  }
  .prompt-input:focus { border-color: var(--g-dim); box-shadow: 0 0 8px var(--g-glow); }
  .prompt-input::placeholder { color: var(--txt-dim); }

  /* ---- GENRES ---- */
  .section-label {
    font-size: .56rem;
    font-weight: 600;
    letter-spacing: .12em;
    text-transform: uppercase;
    color: var(--txt-dim);
    margin-bottom: .2rem;
  }
  .genres {
    display: flex;
    flex-wrap: wrap;
    gap: .25rem;
  }
  .genre-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--txt-dim);
    font-family: var(--mono);
    font-size: .62rem;
    padding: .2rem .5rem;
    border-radius: var(--r);
    cursor: pointer;
    transition: all .1s;
    letter-spacing: .02em;
  }
  .genre-btn:hover { border-color: var(--border-hi); color: var(--txt); }
  .genre-btn.active { color: var(--g); border-color: var(--g-dim); background: var(--g-glow); }
  .genre-btn.fusion-pick {
    color: var(--g) !important;
    border-color: var(--g-dim) !important;
    background: var(--g-glow) !important;
    box-shadow: 0 0 6px var(--g-glow);
  }

  /* ---- FUSION ---- */
  .fusion-toggle {
    display: flex;
    align-items: center;
    gap: .4rem;
    cursor: pointer;
    user-select: none;
  }
  .fusion-toggle input {
    appearance: none;
    width: 22px; height: 11px;
    background: var(--border);
    border-radius: 2px;
    position: relative;
    cursor: pointer;
  }
  .fusion-toggle input::after {
    content: '';
    position: absolute;
    top: 1px; left: 1px;
    width: 9px; height: 9px;
    background: var(--txt-dim);
    border-radius: 1px;
    transition: all .15s;
  }
  .fusion-toggle input:checked { background: var(--g-dim); }
  .fusion-toggle input:checked::after { left: 12px; background: var(--g); }
  .fusion-label { font-size: .6rem; color: var(--txt-dim); letter-spacing: .06em; text-transform: uppercase; }
  .fusion-toggle input:checked ~ .fusion-label { color: var(--g); }
  .fusion-hint { font-size: .56rem; color: var(--txt-dim); opacity: 0; transition: opacity .15s; }
  .fusion-toggle input:checked ~ .fusion-hint { opacity: 1; }

  /* ---- GENERATE ---- */
  .btn-generate {
    width: 100%;
    background: transparent;
    border: 1px solid var(--g-dim);
    color: var(--g);
    font-family: var(--mono);
    font-size: .72rem;
    font-weight: 700;
    letter-spacing: .1em;
    text-transform: uppercase;
    padding: .5rem;
    border-radius: var(--r);
    cursor: pointer;
    transition: all .15s;
  }
  .btn-generate:hover { background: var(--g-glow); box-shadow: 0 0 12px var(--g-glow2); }
  .btn-generate:disabled { opacity: .3; cursor: wait; }

  /* ---- TRANSPORT ---- */
  .transport {
    display: flex;
    align-items: center;
    gap: .3rem;
  }
  .t-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--txt-dim);
    font-family: var(--mono);
    font-size: .6rem;
    font-weight: 600;
    letter-spacing: .06em;
    text-transform: uppercase;
    padding: .25rem .5rem;
    border-radius: var(--r);
    cursor: pointer;
    transition: all .1s;
  }
  .t-btn:hover { border-color: var(--border-hi); color: var(--txt); }
  .t-btn.t-play { color: var(--g-dim); }
  .t-btn.t-play:hover { color: var(--g); border-color: var(--g-dim); }
  .t-btn.t-stop { color: #804040; }
  .t-btn.t-stop:hover { color: var(--red); border-color: #804040; }
  .t-btn.t-regen { border-style: dashed; }
  .t-btn:disabled { opacity: .3; }
  .transport-spacer { flex: 1; }

  /* ---- TWEAK ---- */
  .tweak-row {
    display: flex;
    flex-wrap: wrap;
    gap: .2rem;
    align-items: center;
  }
  .tweak-label {
    font-size: .52rem;
    font-weight: 600;
    letter-spacing: .1em;
    text-transform: uppercase;
    color: var(--txt-dim);
    min-width: 3rem;
  }
  .tweak-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--txt-dim);
    font-family: var(--mono);
    font-size: .56rem;
    padding: .15rem .4rem;
    border-radius: var(--r);
    cursor: pointer;
    transition: all .1s;
  }
  .tweak-btn:hover { border-color: var(--border-hi); color: var(--txt); }
  .tweak-btn.mood { color: var(--amber); border-color: #3a3020; }
  .tweak-btn.mood:hover { border-color: var(--amber); }
  .tweak-btn:disabled { opacity: .3; }

  /* ---- EDIT ---- */
  .edit-row {
    display: flex;
    align-items: center;
    gap: .25rem;
  }
  .edit-input {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--txt);
    font-family: var(--mono);
    font-size: .68rem;
    padding: .3rem .5rem;
    border-radius: var(--r);
    outline: none;
    caret-color: var(--g);
  }
  .edit-input:focus { border-color: var(--g-dim); }
  .edit-input::placeholder { color: var(--txt-dim); }
  .edit-apply {
    background: transparent;
    border: 1px solid var(--g-dim);
    color: var(--g);
    font-family: var(--mono);
    font-size: .56rem;
    font-weight: 600;
    letter-spacing: .06em;
    text-transform: uppercase;
    padding: .3rem .5rem;
    border-radius: var(--r);
    cursor: pointer;
  }
  .edit-apply:hover { background: var(--g-glow); }
  .edit-apply:disabled { opacity: .3; }
  .edit-undo {
    background: transparent;
    border: 1px dashed var(--border);
    color: var(--txt-dim);
    font-family: var(--mono);
    font-size: .56rem;
    padding: .3rem .45rem;
    border-radius: var(--r);
    cursor: pointer;
  }
  .edit-undo:hover { border-color: var(--border-hi); color: var(--txt); }
  .edit-undo:disabled { opacity: .2; }

  /* ---- STATUS ---- */
  .status {
    font-size: .62rem;
    color: var(--txt-dim);
    min-height: 1em;
  }
  .status.playing { color: var(--g); }
  .status.error { color: var(--red); }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.2} }
  .status.playing::before {
    content: '>';
    margin-right: 4px;
    animation: blink 1s step-end infinite;
  }

  /* ---- EDITOR (right pane) ---- */
  .editor-bar {
    display: flex;
    align-items: center;
    padding: .3rem .7rem;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    font-size: .52rem;
    font-weight: 600;
    letter-spacing: .1em;
    text-transform: uppercase;
    color: var(--txt-dim);
  }
  .editor-bar-hint {
    margin-left: auto;
    font-weight: 400;
    opacity: .4;
  }
  strudel-editor {
    display: block;
    flex: 1;
    min-height: 0;
    overflow-y: auto;
  }
  .output.hidden { display: none; }

  /* ---- RESPONSIVE: collapse to 1-column ---- */
  @media (max-width: 900px) {
    .shell {
      grid-template-columns: 1fr;
    }
    .panel {
      border-right: none;
      border-bottom: 1px solid var(--border);
      max-height: none;
    }
    .output {
      min-height: 300px;
    }
  }

  @media (max-width: 500px) {
    .panel { padding: .8rem .6rem; }
    .btn-generate { font-size: .65rem; }
    .genre-btn { font-size: .56rem; padding: .15rem .35rem; }
  }
</style>
</head>
<body>
<div class="shell">

  <!-- LEFT: CONTROLS -->
  <div class="panel">
    <div>
      <div class="brand"><b>text-to-strudel</b></div>
      <div class="tagline">type anything. get <em>music</em>.</div>
    </div>

    <details class="api" id="apiSettings">
      <summary>api</summary>
      <div class="api-row">
        <select id="apiProvider">
          <option value="claude">Claude</option>
          <option value="gemini">Gemini</option>
        </select>
        <input type="password" id="apiKey" placeholder="sk-ant-... or AIza..." autocomplete="off" spellcheck="false">
        <button class="api-save" id="apiSave">save</button>
      </div>
      <div class="api-hint" id="apiHint">no key = algorithmic mode</div>
    </details>

    <div>
      <div class="section-label">input</div>
      <textarea class="prompt-input" id="input" placeholder="> a word, a phrase, a feeling..." rows="2"></textarea>
    </div>

    <div>
      <div class="section-label">genre</div>
      <div class="genres" id="genres">
        <button class="genre-btn active" data-genre="edm">EDM</button>
        <button class="genre-btn" data-genre="jazz">Jazz</button>
        <button class="genre-btn" data-genre="classical">Classical</button>
        <button class="genre-btn" data-genre="blues">Blues</button>
        <button class="genre-btn" data-genre="ambient">Ambient</button>
        <button class="genre-btn" data-genre="lofi">Lo-fi</button>
        <button class="genre-btn" data-genre="world">World</button>
        <button class="genre-btn" data-genre="random">Random</button>
      </div>
      <label class="fusion-toggle" id="fusionToggle">
        <input type="checkbox" id="fusionCheck">
        <span class="fusion-label">Fusion</span>
        <span class="fusion-hint">multi-select</span>
      </label>
    </div>

    <button class="btn-generate" id="playBtn">generate &amp; play</button>

    <div class="transport">
      <button class="t-btn t-play" id="runBtn">play</button>
      <button class="t-btn t-stop" id="stopBtn">stop</button>
      <span class="transport-spacer"></span>
      <button class="t-btn t-regen" id="regenBtn" title="Same input, new interpretation">regen</button>
    </div>

    <div class="tweak-row" id="refineRow" style="display:none">
      <span class="tweak-label">refine</span>
      <button class="tweak-btn refine-btn" data-dir="faster">faster</button>
      <button class="tweak-btn refine-btn" data-dir="slower">slower</button>
      <button class="tweak-btn refine-btn" data-dir="brighter">brighter</button>
      <button class="tweak-btn refine-btn" data-dir="darker">darker</button>
      <button class="tweak-btn refine-btn" data-dir="more reverb">spacious</button>
      <button class="tweak-btn refine-btn" data-dir="drier">dry</button>
      <button class="tweak-btn refine-btn" data-dir="louder">louder</button>
      <button class="tweak-btn refine-btn" data-dir="quieter">quieter</button>
    </div>
    <div class="tweak-row" id="moodRow" style="display:none">
      <span class="tweak-label">mood</span>
      <button class="tweak-btn refine-btn mood" data-dir="make it darker and moodier">dark</button>
      <button class="tweak-btn refine-btn mood" data-dir="make it euphoric and uplifting">euphoric</button>
      <button class="tweak-btn refine-btn mood" data-dir="make it dreamy and floating">dreamy</button>
      <button class="tweak-btn refine-btn mood" data-dir="make it aggressive and intense">aggressive</button>
    </div>

    <div class="edit-row" id="editRow" style="display:none">
      <span class="tweak-label">edit</span>
      <input class="edit-input" id="editInput" type="text" placeholder="> describe change..." autocomplete="off">
      <button class="edit-apply" id="editApply">apply</button>
      <button class="edit-undo" id="editUndo" disabled>undo</button>
    </div>

    <div class="status" id="status"></div>
  </div>

  <!-- RIGHT: EDITOR -->
  <div class="output hidden" id="editorWrap">
    <div class="editor-bar">
      <span>output</span>
      <span class="editor-bar-hint">ctrl+enter play / ctrl+. stop</span>
    </div>
    <strudel-editor id="strudelEditor"></strudel-editor>
  </div>

</div>
<script src="https://unpkg.com/@strudel/repl@latest"></script>
<script src="app.js"></script>
</body>
</html>
