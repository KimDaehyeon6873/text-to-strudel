<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>text-to-strudel</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&family=Red+Hat+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0e;
    --surface: #101016;
    --raised: #16161e;
    --border: #1e1e2a;
    --border-active: #2e2e40;
    --text: #d0d0d8;
    --text-2: #8888a0;
    --text-3: #50506a;
    --amber: #e8a040;
    --amber-dim: rgba(232, 160, 64, .06);
    --green: #38c068;
    --red: #d84848;
    --body: 'Outfit', sans-serif;
    --mono: 'Red Hat Mono', monospace;
    --r: 5px;
    --grain: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.025'/%3E%3C/svg%3E");
  }
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--body);
    font-weight: 300;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    padding: 3rem 1.25rem 4rem;
  }
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background: var(--grain);
    pointer-events: none;
    z-index: 9999;
  }
  .app { max-width: 740px; width: 100%; }

  /* ---- HEADER ---- */
  .brand {
    font-family: var(--mono);
    font-size: .72rem;
    font-weight: 600;
    letter-spacing: .12em;
    text-transform: uppercase;
    color: var(--text-2);
    margin-bottom: .35rem;
  }
  .tagline {
    font-size: 1.6rem;
    font-weight: 300;
    color: var(--text);
    line-height: 1.3;
    margin-bottom: 2.5rem;
  }
  .tagline em {
    font-style: normal;
    color: var(--amber);
  }

  /* ---- API ---- */
  details.api { margin-bottom: 1.5rem; }
  details.api summary {
    font-family: var(--mono);
    font-size: .62rem;
    font-weight: 600;
    letter-spacing: .1em;
    text-transform: uppercase;
    color: var(--text-3);
    cursor: pointer;
    user-select: none;
    transition: color .15s;
  }
  details.api summary:hover { color: var(--text-2); }
  details.api[open] summary { color: var(--amber); }
  .api-row { display: flex; gap: .5rem; margin-top: .5rem; }
  .api-row select, .api-row input {
    background: var(--surface); border: 1px solid var(--border); color: var(--text);
    font-size: .78rem; padding: .4rem .55rem; border-radius: var(--r); outline: none;
    transition: border-color .15s;
  }
  .api-row select { font-family: var(--body); }
  .api-row input { flex: 1; font-family: var(--mono); font-size: .72rem; }
  .api-row select:focus, .api-row input:focus { border-color: var(--amber); }
  .api-save {
    font-family: var(--mono); font-size: .62rem; font-weight: 600;
    letter-spacing: .08em; text-transform: uppercase;
    background: var(--surface); border: 1px solid var(--border); color: var(--text-2);
    padding: .35rem .65rem; border-radius: var(--r); cursor: pointer;
    transition: all .15s;
  }
  .api-save:hover { border-color: var(--border-active); color: var(--text); }
  .api-hint { font-size: .66rem; color: var(--text-3); margin-top: .3rem; }
  .api-hint.saved { color: var(--green); }
  .api-hint.error { color: var(--red); }

  /* ---- INPUT ---- */
  .prompt-input {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: var(--body);
    font-size: 1rem;
    font-weight: 300;
    padding: .9rem 1rem;
    border-radius: var(--r);
    resize: vertical;
    min-height: 64px;
    outline: none;
    line-height: 1.5;
    transition: border-color .2s, box-shadow .2s;
  }
  .prompt-input:focus {
    border-color: var(--amber);
    box-shadow: 0 0 0 1px var(--amber), 0 4px 24px rgba(232,160,64,.04);
  }
  .prompt-input::placeholder { color: var(--text-3); }

  /* ---- GENRES ---- */
  .genres {
    display: flex; flex-wrap: wrap; gap: .35rem;
    margin: 1.2rem 0; align-items: center;
  }
  .genre-btn {
    font-family: var(--mono); font-size: .66rem; font-weight: 400;
    letter-spacing: .02em;
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-3);
    padding: .3rem .75rem;
    border-radius: 100px;
    cursor: pointer;
    transition: all .12s;
  }
  .genre-btn:hover { border-color: var(--border-active); color: var(--text-2); }
  .genre-btn.active {
    color: #fff;
    border-color: var(--gc, var(--amber));
    background: color-mix(in srgb, var(--gc, var(--amber)) 10%, transparent);
  }
  .genre-btn.fusion-pick {
    color: #fff !important;
    border-color: var(--gc) !important;
    background: color-mix(in srgb, var(--gc) 12%, transparent) !important;
  }
  .genre-btn[data-genre="edm"]       { --gc: #d040d0; }
  .genre-btn[data-genre="jazz"]      { --gc: #d0b040; }
  .genre-btn[data-genre="classical"] { --gc: #8888aa; }
  .genre-btn[data-genre="blues"]     { --gc: #4070d0; }
  .genre-btn[data-genre="ambient"]   { --gc: #40b8d0; }
  .genre-btn[data-genre="lofi"]      { --gc: #d07050; }
  .genre-btn[data-genre="world"]     { --gc: #40d070; }
  .genre-btn[data-genre="random"]    { --gc: #909090; }
  .genre-btn[data-genre="random"]    { --gc: #909090; }
  .genre-sep { color: var(--text-3); font-size: .55rem; padding: 0 .1rem; user-select: none; }
  .fusion-toggle {
    display: flex; align-items: center; gap: .45rem;
    margin: .5rem 0 0; cursor: pointer; user-select: none;
  }
  .fusion-toggle input {
    appearance: none; -webkit-appearance: none;
    width: 28px; height: 14px;
    background: var(--border);
    border-radius: 100px;
    position: relative;
    cursor: pointer;
    transition: background .2s;
  }
  .fusion-toggle input::after {
    content: '';
    position: absolute;
    top: 2px; left: 2px;
    width: 10px; height: 10px;
    background: var(--text-3);
    border-radius: 50%;
    transition: all .2s;
  }
  .fusion-toggle input:checked {
    background: var(--amber);
  }
  .fusion-toggle input:checked::after {
    left: 16px;
    background: var(--bg);
  }
  .fusion-label {
    font-family: var(--mono); font-size: .64rem; font-weight: 600;
    letter-spacing: .06em; text-transform: uppercase;
    color: var(--text-3);
    transition: color .15s;
  }
  .fusion-toggle input:checked ~ .fusion-label { color: var(--amber); }
  .fusion-hint {
    font-size: .6rem; color: var(--text-3); opacity: 0;
    transition: opacity .2s;
  }
  .fusion-toggle input:checked ~ .fusion-hint { opacity: 1; }

  /* ---- PRIMARY ACTION ---- */
  .action-row {
    margin: 1.2rem 0 .6rem;
  }
  .btn-generate {
    width: 100%;
    font-family: var(--mono);
    font-size: .82rem;
    font-weight: 600;
    letter-spacing: .08em;
    text-transform: uppercase;
    background: var(--amber);
    color: var(--bg);
    border: none;
    padding: .7rem;
    border-radius: var(--r);
    cursor: pointer;
    transition: all .15s;
  }
  .btn-generate:hover { filter: brightness(1.1); box-shadow: 0 0 20px rgba(232,160,64,.15); }
  .btn-generate:disabled { opacity: .35; cursor: wait; filter: none; box-shadow: none; }

  /* ---- TRANSPORT ---- */
  .transport {
    display: flex; align-items: center; gap: .4rem;
    margin-bottom: .5rem;
  }
  .t-btn {
    font-family: var(--mono); font-size: .64rem; font-weight: 600;
    letter-spacing: .06em; text-transform: uppercase;
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-3);
    padding: .3rem .7rem;
    border-radius: var(--r);
    cursor: pointer;
    transition: all .12s;
  }
  .t-btn:hover { border-color: var(--border-active); color: var(--text-2); }
  .t-btn.t-play  { color: var(--green); border-color: color-mix(in srgb, var(--green) 25%, transparent); }
  .t-btn.t-play:hover { background: color-mix(in srgb, var(--green) 6%, transparent); border-color: var(--green); }
  .t-btn.t-stop  { color: var(--red);   border-color: color-mix(in srgb, var(--red)   25%, transparent); }
  .t-btn.t-stop:hover { background: color-mix(in srgb, var(--red) 6%, transparent); border-color: var(--red); }
  .t-btn.t-regen { border-style: dashed; }
  .t-btn.t-regen:hover { border-style: solid; }
  .t-btn:disabled { opacity: .3; cursor: wait; }
  .transport-spacer { flex: 1; }

  /* ---- REFINE / MOOD ---- */
  .tweak-row {
    display: flex; flex-wrap: wrap; gap: .3rem;
    align-items: center; margin-bottom: .3rem;
  }
  .tweak-label {
    font-family: var(--mono); font-size: .58rem; font-weight: 600;
    letter-spacing: .1em; text-transform: uppercase;
    color: var(--text-3); margin-right: .15rem; min-width: 3.5rem;
  }
  .tweak-btn {
    font-family: var(--mono); font-size: .6rem; font-weight: 400;
    letter-spacing: .02em;
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-3);
    padding: .2rem .5rem;
    border-radius: 100px;
    cursor: pointer;
    transition: all .12s;
  }
  .tweak-btn:hover { border-color: var(--border-active); color: var(--text-2); }
  .tweak-btn.mood { color: color-mix(in srgb, var(--amber) 70%, var(--text-3)); border-color: color-mix(in srgb, var(--amber) 18%, var(--border)); }
  .tweak-btn.mood:hover { color: var(--amber); border-color: color-mix(in srgb, var(--amber) 40%, var(--border)); }
  .tweak-btn:disabled { opacity: .3; cursor: wait; }

  /* ---- STATUS ---- */
  .status {
    font-family: var(--mono); font-size: .66rem; font-weight: 400;
    color: var(--text-3);
    margin: .5rem 0;
    min-height: 1em;
    letter-spacing: .02em;
  }
  .status.playing { color: var(--green); }
  .status.error { color: var(--red); }
  @keyframes dot { 0%,100%{opacity:1} 50%{opacity:.25} }
  .status.playing::before {
    content: '';
    display: inline-block;
    width: 5px; height: 5px;
    background: var(--green);
    border-radius: 50%;
    margin-right: 5px;
    box-shadow: 0 0 6px var(--green);
    animation: dot 1.2s ease-in-out infinite;
  }

  /* ---- EDITOR ---- */
  .editor-wrap {
    border: 1px solid var(--border);
    border-radius: var(--r);
    overflow: hidden;
    display: none;
    animation: reveal .25s ease-out;
  }
  .editor-wrap.visible { display: block; }
  @keyframes reveal {
    from { opacity: 0; transform: translateY(6px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .editor-bar {
    display: flex; align-items: center;
    padding: .35rem .8rem;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    font-family: var(--mono); font-size: .58rem; font-weight: 600;
    letter-spacing: .1em; text-transform: uppercase; color: var(--text-3);
  }
  .editor-bar-hint {
    margin-left: auto;
    font-weight: 400; letter-spacing: .03em;
    opacity: .5;
  }
  strudel-editor {
    display: block;
    min-height: 0;
    max-height: 540px;
    overflow-y: auto;
  }

  /* ---- RESPONSIVE ---- */
  @media (max-width: 600px) {
    body { padding: 1.5rem .75rem 3rem; }
    .tagline { font-size: 1.2rem; }
    .btn-generate { font-size: .75rem; }
    .genre-btn { font-size: .6rem; padding: .25rem .6rem; }
  }
</style>
</head>
<body>
<div class="app">

  <div class="brand">text-to-strudel</div>
  <h1 class="tagline">Type anything. Get <em>music</em>.</h1>

  <details class="api" id="apiSettings">
    <summary>api settings</summary>
    <div class="api-row">
      <select id="apiProvider">
        <option value="claude">Claude</option>
        <option value="gemini">Gemini</option>
      </select>
      <input type="password" id="apiKey" placeholder="sk-ant-... or AIza..." autocomplete="off" spellcheck="false">
      <button class="api-save" id="apiSave">Save</button>
    </div>
    <div class="api-hint" id="apiHint">No key = algorithmic mode. With key = AI creative mode.</div>
  </details>

  <textarea class="prompt-input" id="input" placeholder="A word, a phrase, a feeling..." rows="2"></textarea>

  <div class="genres" id="genres">
    <button class="genre-btn active" data-genre="edm">EDM</button>
    <button class="genre-btn" data-genre="jazz">Jazz</button>
    <button class="genre-btn" data-genre="classical">Classical</button>
    <button class="genre-btn" data-genre="blues">Blues</button>
    <button class="genre-btn" data-genre="ambient">Ambient</button>
    <button class="genre-btn" data-genre="lofi">Lo-fi</button>
    <button class="genre-btn" data-genre="world">World</button>
    <button class="genre-btn" data-genre="random">Random</button>
  </div>
  <label class="fusion-toggle" id="fusionToggle">
    <input type="checkbox" id="fusionCheck">
    <span class="fusion-label">Fusion</span>
    <span class="fusion-hint">select multiple genres to combine</span>
  </label>

  <div class="action-row">
    <button class="btn-generate" id="playBtn">Generate &amp; Play</button>
  </div>

  <div class="transport">
    <button class="t-btn t-play" id="runBtn">Play</button>
    <button class="t-btn t-stop" id="stopBtn">Stop</button>
    <span class="transport-spacer"></span>
    <button class="t-btn t-regen" id="regenBtn" title="Same input, new interpretation">Regen</button>
  </div>

  <div class="tweak-row" id="refineRow" style="display:none">
    <span class="tweak-label">Refine</span>
    <button class="tweak-btn refine-btn" data-dir="faster">faster</button>
    <button class="tweak-btn refine-btn" data-dir="slower">slower</button>
    <button class="tweak-btn refine-btn" data-dir="brighter">brighter</button>
    <button class="tweak-btn refine-btn" data-dir="darker">darker</button>
    <button class="tweak-btn refine-btn" data-dir="more reverb">spacious</button>
    <button class="tweak-btn refine-btn" data-dir="drier">dry</button>
    <button class="tweak-btn refine-btn" data-dir="louder">louder</button>
    <button class="tweak-btn refine-btn" data-dir="quieter">quieter</button>
  </div>
  <div class="tweak-row" id="moodRow" style="display:none">
    <span class="tweak-label">Mood</span>
    <button class="tweak-btn refine-btn mood" data-dir="make it darker and moodier">dark</button>
    <button class="tweak-btn refine-btn mood" data-dir="make it euphoric and uplifting">euphoric</button>
    <button class="tweak-btn refine-btn mood" data-dir="make it dreamy and floating">dreamy</button>
    <button class="tweak-btn refine-btn mood" data-dir="make it aggressive and intense">aggressive</button>
  </div>

  <div class="status" id="status"></div>

  <div class="editor-wrap" id="editorWrap">
    <div class="editor-bar">
      <span>editor</span>
      <span class="editor-bar-hint">ctrl+enter play / ctrl+. stop</span>
    </div>
    <strudel-editor id="strudelEditor"></strudel-editor>
  </div>

</div>
<script src="https://unpkg.com/@strudel/repl@latest"></script>
<script src="app.js"></script>
</body>
</html>
