<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>text-to-strudel</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #030303;
    --surface: #080808;
    --raised: #0e0e0e;
    --border: #181818;
    --border-hi: #282828;
    --g: #00e060;
    --g-dim: #00803a;
    --g-mute: #004420;
    --g-glow: rgba(0,224,96,.06);
    --g-glow2: rgba(0,224,96,.12);
    --txt: #90b090;
    --txt-hi: #c0e0c0;
    --txt-dim: #507050;
    --red: #c03030;
    --mono: 'JetBrains Mono', 'Consolas', monospace;
    --r: 1px;
  }
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--txt);
    font-family: var(--mono);
    font-size: 1rem;
    line-height: 1.5;
    min-height: 100vh;
  }
  /* CRT scanlines */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(0,0,0,.04) 3px, rgba(0,0,0,.04) 4px);
    pointer-events: none;
    z-index: 9999;
  }

  /* ---- 2-COLUMN SHELL ---- */
  .shell {
    display: grid;
    grid-template-columns: 1fr 2fr;
    height: 100vh;
  }
  .panel {
    border-right: 1px solid var(--border);
    padding: 1.2rem 1.2rem;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: .7rem;
    position: sticky;
    top: 0;
    height: 100vh;
  }
  .output {
    display: flex;
    flex-direction: column;
    min-height: 100vh;
    padding-top: 2.5rem;
    overflow-y: auto;
  }
  .output.hidden { display: none; }

  /* ---- MODULE HEADERS ---- */
  .mod-label {
    font-size: .7rem;
    font-weight: 700;
    letter-spacing: .18em;
    text-transform: uppercase;
    color: var(--txt-dim);
    margin-bottom: .2rem;
  }

  /* ---- BRAND ---- */
  .brand-row {
    padding-bottom: .5rem;
    border-bottom: 1px solid var(--border);
  }
  .brand {
    font-size: .62rem;
    font-weight: 700;
    letter-spacing: .14em;
    text-transform: uppercase;
    color: var(--txt-dim);
    margin-bottom: .15rem;
  }
  .tagline {
    font-size: 1.3rem;
    font-weight: 400;
    color: var(--txt);
    line-height: 1.3;
  }
  .tagline em {
    font-style: normal;
    color: var(--g);
  }

  /* ---- API ---- */
  details.api summary {
    font-size: .66rem;
    font-weight: 700;
    letter-spacing: .14em;
    text-transform: uppercase;
    color: var(--txt-dim);
    cursor: pointer;
  }
  details.api summary:hover { color: var(--txt); }
  details.api[open] summary { color: var(--g-dim); }
  details.api.verified summary { color: var(--g-dim); }
  details.api.verified summary::after { content: ' [OK]'; }
  details.api.no-key summary::after { content: ''; }
  details.api.invalid summary { color: var(--red); }
  details.api.invalid summary::after { content: ' [FAIL]'; }
  .api-row { display: flex; gap: .3rem; margin-top: .3rem; }
  .api-row select, .api-row input {
    background: var(--surface); border: 1px solid var(--border); color: var(--txt);
    font-family: var(--mono); font-size: .74rem;
    padding: .25rem .35rem; border-radius: var(--r); outline: none;
  }
  .api-row input { flex: 1; }
  .api-row select:focus, .api-row input:focus { border-color: var(--g-mute); }
  .api-save {
    background: var(--surface); border: 1px solid var(--border); color: var(--txt-dim);
    font-family: var(--mono); font-size: .66rem; font-weight: 700;
    letter-spacing: .1em; text-transform: uppercase;
    padding: .25rem .4rem; border-radius: var(--r); cursor: pointer;
  }
  .api-save:hover { border-color: var(--border-hi); color: var(--txt); }
  .api-hint { font-size: .68rem; color: var(--txt-dim); margin-top: .2rem; }
  .api-hint.saved { color: var(--g-dim); }
  .api-hint.error { color: var(--red); }

  /* ---- INPUT ---- */
  .prompt-input {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--g);
    font-family: var(--mono);
    font-size: 1.05rem;
    padding: .6rem .7rem;
    border-radius: var(--r);
    resize: vertical;
    min-height: 48px;
    outline: none;
    caret-color: var(--g);
    transition: border-color .12s;
  }
  .prompt-input:focus { border-color: var(--g-mute); box-shadow: 0 0 0 1px var(--g-mute); }
  .prompt-input::placeholder { color: var(--txt-dim); }

  /* ---- GENRES ---- */
  .genres { display: flex; flex-wrap: wrap; gap: .2rem; }
  .genre-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--txt-dim);
    font-family: var(--mono);
    font-size: .8rem;
    padding: .25rem .6rem;
    border-radius: var(--r);
    cursor: pointer;
    transition: all .08s;
  }
  .genre-btn:hover { border-color: var(--border-hi); color: var(--txt); }
  .genre-btn.active {
    color: var(--g);
    border-color: var(--g-mute);
    background: var(--g-glow);
    box-shadow: inset 0 0 8px var(--g-glow);
  }
  .genre-btn.fusion-pick {
    color: var(--g) !important;
    border-color: var(--g-mute) !important;
    background: var(--g-glow) !important;
    box-shadow: inset 0 0 8px var(--g-glow);
  }

  /* ---- FUSION ---- */
  .fusion-toggle {
    display: flex; align-items: center; gap: .35rem;
    cursor: pointer; user-select: none; margin-top: .15rem;
  }
  .fusion-toggle input {
    appearance: none; width: 20px; height: 10px;
    background: var(--border); border-radius: var(--r);
    position: relative; cursor: pointer;
  }
  .fusion-toggle input::after {
    content: ''; position: absolute;
    top: 1px; left: 1px; width: 8px; height: 8px;
    background: var(--txt-dim); border-radius: var(--r);
    transition: all .12s;
  }
  .fusion-toggle input:checked { background: var(--g-mute); }
  .fusion-toggle input:checked::after { left: 11px; background: var(--g); }
  .fusion-label { font-size: .68rem; color: var(--txt-dim); letter-spacing: .08em; text-transform: uppercase; }
  .fusion-toggle input:checked ~ .fusion-label { color: var(--g-dim); }
  .fusion-hint { font-size: .66rem; color: var(--txt-dim); opacity: 0; transition: opacity .12s; }
  .fusion-toggle input:checked ~ .fusion-hint { opacity: 1; }

  /* ---- GENERATE (primary action) ---- */
  .btn-generate {
    width: 100%;
    background: var(--g-mute);
    border: 1px solid var(--g-dim);
    color: var(--g);
    font-family: var(--mono);
    font-size: .94rem;
    font-weight: 700;
    letter-spacing: .12em;
    text-transform: uppercase;
    padding: .65rem;
    border-radius: var(--r);
    cursor: pointer;
    transition: all .12s;
    text-shadow: 0 0 8px var(--g-glow2);
  }
  .btn-generate:hover {
    background: var(--g-dim);
    color: #000;
    box-shadow: 0 0 16px var(--g-glow2), inset 0 0 12px rgba(0,0,0,.3);
  }
  .btn-generate:disabled { opacity: .25; cursor: wait; }

  /* ---- TRANSPORT ---- */
  .transport { display: flex; align-items: center; gap: .25rem; }
  .t-btn {
    background: var(--surface); border: 1px solid var(--border);
    color: var(--txt-dim); font-family: var(--mono);
    font-size: .8rem; font-weight: 700;
    letter-spacing: .08em; text-transform: uppercase;
    padding: .25rem .55rem; border-radius: var(--r);
    cursor: pointer; transition: all .08s;
  }
  .t-btn:hover { border-color: var(--border-hi); color: var(--txt); }
  .t-btn.t-play { color: var(--g-dim); }
  .t-btn.t-play:hover { color: var(--g); border-color: var(--g-mute); }
  .t-btn.t-stop { color: var(--red); border-color: #1a0808; }
  .t-btn.t-stop:hover { border-color: var(--red); }
  .t-btn.t-regen { border-style: dashed; }
  .t-btn:disabled { opacity: .2; }
  .transport-spacer { flex: 1; }

  /* ---- TWEAK ROWS ---- */
  .tweak-row { display: flex; flex-wrap: wrap; gap: .18rem; align-items: center; }
  .tweak-label {
    font-size: .66rem; font-weight: 700;
    letter-spacing: .12em; text-transform: uppercase;
    color: var(--txt-dim); min-width: 2.8rem;
  }
  .tweak-btn {
    background: transparent; border: 1px solid var(--border);
    color: var(--txt-dim); font-family: var(--mono);
    font-size: .76rem; padding: .2rem .5rem;
    border-radius: var(--r); cursor: pointer;
    transition: all .08s;
  }
  .tweak-btn:hover { border-color: var(--border-hi); color: var(--txt); }
  .tweak-btn.mood { color: var(--g-dim); border-color: var(--g-mute); }
  .tweak-btn.mood:hover { color: var(--g); border-color: var(--g-dim); }
  .tweak-btn:disabled { opacity: .2; }

  .mixer-toggle {
    background: transparent; border: 1px dashed var(--border);
    color: var(--txt-dim); font-family: var(--mono);
    font-size: .66rem; font-weight: 700;
    letter-spacing: .08em; text-transform: uppercase;
    padding: .25rem .4rem; border-radius: var(--r); cursor: pointer;
    margin-left: auto;
  }
  .mixer-toggle:hover { border-color: var(--border-hi); color: var(--txt); }
  .mixer-toggle.active { color: var(--g-dim); border-color: var(--g-mute); border-style: solid; }

  /* ---- MIXER ---- */
  .mixer { display: flex; flex-direction: column; gap: .15rem; }
  .mixer-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: .1rem .4rem;
  }
  .mixer-ch {
    display: flex; align-items: center; gap: 0;
    height: 1.4rem;
  }
  .ch-label {
    font-size: .7rem; font-weight: 600;
    letter-spacing: .08em; text-transform: uppercase;
    color: var(--txt-dim); width: 4.8rem; flex-shrink: 0;
  }
  .ch-minus, .ch-plus, .ch-toggle {
    width: 1.8rem; height: 1.4rem;
    display: flex; align-items: center; justify-content: center;
    background: var(--surface); border: 1px solid var(--border);
    color: var(--txt-dim); font-family: var(--mono);
    font-size: .8rem; font-weight: 700;
    border-radius: var(--r); cursor: pointer;
    transition: all .08s;
  }
  .ch-minus { margin-right: -1px; border-radius: var(--r) 0 0 var(--r); z-index: 0; }
  .ch-plus { border-radius: 0 var(--r) var(--r) 0; z-index: 0; }
  .ch-minus:hover, .ch-plus:hover { background: var(--g-glow); color: var(--g); border-color: var(--g-mute); z-index: 1; }
  .ch-toggle { border-radius: var(--r); margin-right: .15rem; }
  .ch-toggle:hover { color: var(--txt); border-color: var(--border-hi); }
  .mixer-divider { border-top: 1px solid var(--border); margin: .3rem 0; }
  .mixer-tags { display: flex; flex-wrap: wrap; gap: .15rem; padding: .1rem 0; }
  .ch-tag, .ch-mood {
    background: var(--surface); border: 1px solid var(--border);
    color: var(--txt-dim); font-family: var(--mono);
    font-size: .7rem; font-weight: 600;
    letter-spacing: .04em; text-transform: uppercase;
    padding: .2rem .5rem; border-radius: var(--r);
    cursor: pointer; transition: all .08s;
  }
  .ch-tag:hover { color: var(--g); border-color: var(--g-mute); }
  .ch-mood { color: var(--g-dim); border-color: var(--g-mute); }
  .ch-mood:hover { color: var(--g); border-color: var(--g-dim); background: var(--g-glow); }
  .ch-tag.active { color: var(--g) !important; border-color: var(--g-dim) !important; background: var(--g-glow) !important; }
  /* ± click feedback */
  .flash-ok { background: var(--g-glow2) !important; border-color: var(--g-dim) !important; color: var(--g) !important; transition: none !important; }
  .flash-fail { background: rgba(192,48,48,.1) !important; border-color: #401010 !important; color: #804040 !important; transition: none !important; }

  /* ---- EDIT ---- */
  .edit-row { display: flex; align-items: center; gap: .2rem; }
  .edit-input {
    flex: 1; background: var(--bg); border: 1px solid var(--border);
    color: var(--txt); font-family: var(--mono); font-size: .76rem;
    padding: .25rem .4rem; border-radius: var(--r); outline: none;
    caret-color: var(--g);
  }
  .edit-input:focus { border-color: var(--g-mute); }
  .edit-input::placeholder { color: var(--txt-dim); }
  .edit-apply {
    background: transparent; border: 1px solid var(--g-mute);
    color: var(--g-dim); font-family: var(--mono);
    font-size: .66rem; font-weight: 700;
    letter-spacing: .08em; text-transform: uppercase;
    padding: .25rem .4rem; border-radius: var(--r); cursor: pointer;
  }
  .edit-apply:hover { color: var(--g); background: var(--g-glow); }
  .edit-apply:disabled { opacity: .2; }

  /* ---- STATUS ---- */
  .status {
    font-size: .82rem; color: var(--txt-dim); min-height: 1em;
  }
  .status.playing { color: var(--g); }
  .status.error { color: var(--red); }
  @keyframes cursor-blink { 0%,100%{opacity:1} 50%{opacity:0} }
  .status.playing::before {
    content: '\25B6';
    margin-right: 4px;
    font-size: .66rem;
    animation: cursor-blink .8s step-end infinite;
  }

  /* ---- EDITOR (right pane) ---- */
  .editor-bar {
    display: flex; align-items: center;
    padding: .25rem .6rem;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    font-size: .68rem; font-weight: 700;
    letter-spacing: .14em; text-transform: uppercase;
    color: var(--txt-dim);
  }
  .editor-bar-hint {
    margin-left: auto; font-weight: 400; opacity: .35;
  }
  strudel-editor {
    display: block; flex: 1; min-height: 0; overflow-y: auto;
  }

  /* ---- CodeMirror theme override (matrix green on black) ---- */
  .cm-editor {
    background: #020402 !important;
    font-size: .96rem !important;
  }
  .cm-editor .cm-scroller {
    font-family: var(--mono) !important;
  }
  .cm-editor .cm-gutters {
    background: #020402 !important;
    border-right: 1px solid var(--border) !important;
    color: var(--txt-dim) !important;
  }
  .cm-editor .cm-activeLineGutter,
  .cm-editor .cm-activeLine {
    background: rgba(0,224,96,.04) !important;
  }
  .cm-editor .cm-selectionBackground,
  .cm-editor ::selection {
    background: rgba(0,224,96,.15) !important;
  }
  .cm-editor .cm-cursor {
    border-left-color: var(--g) !important;
  }
  /* Base text */
  .cm-editor .cm-content { color: #609860 !important; }
  /* Comments: dark muted green */
  .cm-editor .ͼ13, .cm-editor .ͼm { color: #3a5a3a !important; }
  /* Functions/keywords: bright green */
  .cm-editor .ͼ14, .cm-editor .ͼ19 { color: #00e060 !important; }
  /* Numbers: medium green */
  .cm-editor .ͼz, .cm-editor .ͼd { color: #60c060 !important; }
  /* Strings: bright warm green */
  .cm-editor .ͼ11, .cm-editor .ͼe { color: #40c860 !important; }
  /* Operators/variables: light green */
  .cm-editor .ͼv, .cm-editor .ͼt, .cm-editor .ͼc { color: #80b880 !important; }
  /* Properties: green-white */
  .cm-editor .ͼ1c, .cm-editor .ͼ10, .cm-editor .ͼg { color: #90d090 !important; }
  /* Punctuation: dim */
  .cm-editor .ͼ16 { color: #406040 !important; }
  /* Hide line numbers */
  .cm-editor .cm-gutters { display: none !important; }
  /* Override Strudel highlight/flash colors to green theme */
  .cm-editor { --foreground: var(--g) !important; }
  .cm-editor [style*="rgba(255,255,255"] {
    background-color: rgba(0,224,96,.12) !important;
    filter: none !important;
  }
  .cm-editor [style*="#00CA28"] {
    background-color: rgba(0,224,96,.15) !important;
  }
  .cm-editor [style*="outline"] {
    outline-color: var(--g) !important;
  }
  /* Mini-notation highlight background */
  .cm-editor .cm-strudel-highlight { background: rgba(0,224,96,.06) !important; }

  /* ---- RESPONSIVE ---- */
  @media (max-width: 900px) {
    html { overflow: hidden; height: 100%; }
    body { height: 100%; overflow-x: hidden; overflow-y: auto; -webkit-overflow-scrolling: touch; width: 100%; max-width: 100%; }
    .shell { grid-template-columns: 1fr; height: auto; overflow-x: hidden; width: 100%; }
    .panel { border-right: none; border-bottom: 1px solid var(--border); position: static; height: auto; overflow-y: visible; }
    .output { min-height: 300px; overflow-y: visible; overflow-x: hidden; width: 100%; max-width: 100%; }
    strudel-editor { width: 100%; max-width: 100%; overflow-x: hidden; }
    .cm-editor { max-width: 100% !important; width: 100% !important; }
    .cm-editor .cm-scroller { overflow-x: auto !important; }
    .cm-editor .cm-content,
    .cm-editor .cm-line { white-space: pre-wrap !important; word-break: break-word !important; overflow-wrap: anywhere !important; }
  }
  @media (max-width: 500px) {
    .panel { padding: .7rem .5rem; }
    .btn-generate { font-size: .74rem; }
    .genre-btn { font-size: .68rem; padding: .12rem .3rem; }
  }
</style>
</head>
<body>
<div class="shell">

  <div class="panel">
    <div class="brand-row">
      <div class="brand">text-to-strudel</div>
      <div class="tagline">Type anything. Get <em>music</em>.</div>
    </div>

    <details class="api" id="apiSettings">
      <summary>api</summary>
      <div class="api-row">
        <select id="apiProvider"><option value="gemini">Gemini</option><option value="claude">Claude</option><option value="openai">OpenAI</option></select>
        <input type="password" id="apiKey" placeholder="sk-ant-... or AIza..." autocomplete="off" spellcheck="false">
        <button class="api-save" id="apiSave">save</button>
      </div>
      <div class="api-hint" id="apiHint">no key = algorithmic mode</div>
    </details>

    <div>
      <div class="mod-label">input</div>
      <textarea class="prompt-input" id="input" placeholder="> enter signal..." rows="2"></textarea>
    </div>

    <div>
      <div class="mod-label">genre</div>
      <div class="genres" id="genres">
        <button class="genre-btn active" data-genre="edm">EDM</button>
        <button class="genre-btn" data-genre="jazz">Jazz</button>
        <button class="genre-btn" data-genre="classical">Classical</button>
        <button class="genre-btn" data-genre="blues">Blues</button>
        <button class="genre-btn" data-genre="ambient">Ambient</button>
        <button class="genre-btn" data-genre="lofi">Lo-fi</button>
        <button class="genre-btn" data-genre="world">World</button>
        <button class="genre-btn" data-genre="random">Random</button>
      </div>
      <label class="fusion-toggle" id="fusionToggle">
        <input type="checkbox" id="fusionCheck">
        <span class="fusion-label">Fusion</span>
        <span class="fusion-hint">multi-select</span>
      </label>
    </div>

    <button class="btn-generate" id="playBtn">generate &amp; play</button>

    <div class="transport">
      <button class="t-btn t-play" id="runBtn">play</button>
      <button class="t-btn t-stop" id="stopBtn">stop</button>
      <span class="transport-spacer"></span>
      <button class="t-btn t-regen" id="regenBtn">regen</button>
    </div>

    <!-- MIXER: channel strips in 2-col grid, tone/mood below -->
    <div class="mixer" id="algoMixer" style="display:none">
      <div class="mod-label">mixer</div>
      <div class="mixer-grid">
        <div class="mixer-ch"><span class="ch-label">bpm</span><button class="refine-btn ch-minus" data-dir="slower">-</button><button class="refine-btn ch-plus" data-dir="faster">+</button></div>
        <div class="mixer-ch"><span class="ch-label">gain</span><button class="refine-btn ch-minus" data-dir="quieter">-</button><button class="refine-btn ch-plus" data-dir="louder">+</button></div>
        <div class="mixer-ch"><span class="ch-label">cutoff</span><button class="refine-btn ch-minus" data-dir="darker">-</button><button class="refine-btn ch-plus" data-dir="brighter">+</button></div>
        <div class="mixer-ch"><span class="ch-label">resonance</span><button class="refine-btn ch-minus" data-dir="less resonance">-</button><button class="refine-btn ch-plus" data-dir="more resonance">+</button></div>
        <div class="mixer-ch"><span class="ch-label">highpass</span><button class="refine-btn ch-minus" data-dir="less highpass">-</button><button class="refine-btn ch-plus" data-dir="more highpass">+</button></div>
        <div class="mixer-ch"><span class="ch-label">octave</span><button class="refine-btn ch-minus" data-dir="lower">-</button><button class="refine-btn ch-plus" data-dir="higher">+</button></div>
        <div class="mixer-ch"><span class="ch-label">reverb</span><button class="refine-btn ch-minus" data-dir="drier">-</button><button class="refine-btn ch-plus" data-dir="more reverb">+</button></div>
        <div class="mixer-ch"><span class="ch-label">delay</span><button class="refine-btn ch-minus" data-dir="less delay">-</button><button class="refine-btn ch-plus" data-dir="more delay">+</button></div>
        <div class="mixer-ch"><span class="ch-label">feedback</span><button class="refine-btn ch-minus" data-dir="less feedback">-</button><button class="refine-btn ch-plus" data-dir="more feedback">+</button></div>
        <div class="mixer-ch"><span class="ch-label">density</span><button class="refine-btn ch-minus" data-dir="sparser">-</button><button class="refine-btn ch-plus" data-dir="denser">+</button></div>
        <div class="mixer-ch"><span class="ch-label">swing</span><button class="refine-btn ch-toggle" data-dir="straighten">off</button><button class="refine-btn ch-toggle" data-dir="add swing">on</button></div>
        <div class="mixer-ch"><span class="ch-label">distort</span><button class="refine-btn ch-minus" data-dir="less distortion">-</button><button class="refine-btn ch-plus" data-dir="more distortion">+</button></div>
        <div class="mixer-ch"><span class="ch-label">crush</span><button class="refine-btn ch-minus" data-dir="less crush">-</button><button class="refine-btn ch-plus" data-dir="more crush">+</button></div>
      </div>
      <div class="mixer-divider"></div>
      <div class="mod-label">tone</div>
      <div class="mixer-tags">
        <button class="refine-btn ch-tag" data-dir="scale:major">major</button>
        <button class="refine-btn ch-tag" data-dir="scale:minor">minor</button>
        <button class="refine-btn ch-tag" data-dir="scale:dorian">dorian</button>
        <button class="refine-btn ch-tag" data-dir="scale:phrygian">phrygian</button>
        <button class="refine-btn ch-tag" data-dir="scale:lydian">lydian</button>
        <button class="refine-btn ch-tag" data-dir="scale:pentatonic">pentatonic</button>
      </div>
      <div class="mixer-divider"></div>
      <div class="mod-label">mood</div>
      <div class="mixer-tags">
        <button class="refine-btn ch-mood" data-dir="make it darker and moodier">dark</button>
        <button class="refine-btn ch-mood" data-dir="make it euphoric and uplifting">euphoric</button>
        <button class="refine-btn ch-mood" data-dir="make it dreamy and floating">dreamy</button>
        <button class="refine-btn ch-mood" data-dir="make it aggressive and intense">aggressive</button>
      </div>
    </div>

    <!-- LLM MODE: edit + mixer toggle -->
    <div class="edit-row" id="editRow" style="display:none">
      <span class="tweak-label">edit</span>
      <input class="edit-input" id="editInput" type="text" placeholder="> describe change..." autocomplete="off">
      <button class="edit-apply" id="editApply">apply</button>
      <button class="mixer-toggle" id="mixerToggle" title="Show/hide mixer controls">mixer</button>
    </div>

    <!-- hidden compat anchor -->
    <div id="refineRow" style="display:none"></div>

    <div class="status" id="status"></div>
  </div>

  <div class="output hidden" id="editorWrap">
    <strudel-editor id="strudelEditor"></strudel-editor>
  </div>

</div>
<script src="https://unpkg.com/@strudel/repl@latest"></script>
<script src="app.js"></script>
</body>
</html>
